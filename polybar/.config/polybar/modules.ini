[module/launcher]
type = custom/text
content = ůį£á
content-background = ${colors.black}
content-foreground = ${colors.text-icons}
content-padding = 1
click-left = rofi -show run

[module/tray]
type = internal/tray
tray-background = ${colors.black}
format-margin = 1px
tray-spacing = 1px
tray-size = 30

[module/pacman-updates]
type = custom/script
exec = checkupdates | wc -l
interval = 600
label = Updates: %output%
format-prefix = "ÔÄô "
format-foreground = ${colors.deepskyblue}
format-background = ${colors.black}
format-prefix-foreground = ${colors.deepskyblue}
format-underline = ${colors.deepskyblue}

[module/pacman-packages]
type = custom/script
exec = pacman -Q | wc -l
interval = 1000
label= " Installed: %output%"
format-prefix = "ůįŹĖ "
format-foreground = ${colors.deepskyblue}
format-background = ${colors.black}
format-prefix-foreground = ${colors.deepskyblue}
format-underline = ${colors.deepskyblue}

[module/filesystem]
type = internal/fs
mount-0 = /
mount-1 = /home
mount-2 = /storage
interval = 10
fixed-values = true
spacing = 2
; format-mounted = ůįčä <label-mounted>
format-mounted = Ôā† <label-mounted>
format-mounted-foreground = ${colors.chartreuse}
; label-mounted = %free% of %total%
label-mounted = %free%
label-mounted-foreground = ${colors.chartreuse}
label-mounted-underline = ${colors.chartreuse}
format-mounted-underline = ${colors.chartreuse}

[module/date]
type = custom/script 
exec = date "+%a, %b %d, %Y"
interval = 1000
label = "%output%"
format-prefix = "ÔĀ≥ "
format-foreground = ${colors.deepskyblue}
format-background = ${colors.black}
format-prefix-foreground = ${colors.deepskyblue}
format-prefix-underline = ${colors.deepskyblue}
label-underline = ${colors.deepskyblue}

[module/time]
type = custom/script 
; exec = date "+%I:%M:%S %p"
exec = date "+%H:%M %p"
interval = 1
label = "%output%"
format-prefix = "ÔÄó "
format-foreground = ${colors.deepskyblue}
format-background = ${colors.black}
format-prefix-foreground = ${colors.deepskyblue}
label-underline = ${colors.deepskyblue}
format-prefix-underline = ${colors.deepskyblue}

[module/powermenu]
type = custom/text
content = ÔÄĎ
content-background = ${colors.black}
content-foreground = ${colors.chartreuse}
content-padding = 1
click-left = rofi -show power-menu -modi power-menu:'~/.config/polybar/scripts/rofi-power-menu.sh' -font "JetBrains Mono NF 12" -theme 'Monokai' -theme-str 'window {width: 12em;} listview {lines: 4;}' -location 1 -xoffset 1643 -yoffset 893

[module/bspwm]
type = internal/bspwm
pin-workspaces = true
enable-scroll = true
label-focused = %icon%
label-focused-background = ${colors.black}
label-focused-foreground = ${colors.deepskyblue}
label-focused-underline = ${colors.deepskyblue}
label-focused-padding = 2
label-occupied = %icon%
label-occupied-padding = 2
label-occupied-foreground = ${colors.gold}
label-empty = %icon%
label-empty-foreground = ${colors.white}
label-empty-padding = 2
scroll-up = bspwm-desknext
scroll-down = bspwm-deskprev

ws-icon-0 = 1;ůįľŹ 
ws-icon-1 = 2;ůįľź
ws-icon-2 = 3;ůįľĎ
ws-icon-3 = 4;ůįľí
ws-icon-4 = 5;ůįľď
ws-icon-5 = 6;ůįľĒ
ws-icon-6 = 7;ůįľē
ws-icon-7 = 8;ůįľĖ
ws-icon-8 = 9;ůįľó
ws-icon-9 = 10;ůįŅ™

[module/volume]
type = internal/alsa

master-soundcard = default
speaker-soundcard = default 
headphone-soundcard = default 

format-volume = <ramp-volume>  <label-volume>
format-muted = <label-muted>
label-volume = %percentage%
ramp-volume-foreground = ${colors.gold}
label-volume-foreground = ${colors.gold}
label-muted = ůįłą
label-muted-foreground = ${colors.red}
format-volume-underline = ${colors.gold}
format-muted-underline = ${colors.red}

ramp-volume-0 = ÔÄ¶
ramp-volume-1 = ÔÄß
ramp-volume-2 = ÔÄ®

[module/xxxwindow]
type = custom/script
interval = 0
exec = $HOME/.config/polybar/scripts/xxxwindows.sh
